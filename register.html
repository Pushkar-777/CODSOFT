<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Job Portal</title>

    <link rel="stylesheet" href="css/style.css">

    <style>

        .register-container{
            width:100%;
            min-height:85vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f5f7fb;
        }

        .register-box{
            width:420px;
            background:#fff;
            padding:35px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,.1);
        }

        .register-box h2{
            text-align:center;
            color:#0d6efd;
            margin-bottom:25px;
        }

        .register-box input{
            width:100%;
            padding:14px;
            margin-bottom:18px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
        }

        .register-box button{
            width:100%;
        }

        .register-box p{
            text-align:center;
            margin-top:20px;
        }

        .register-box a{
            text-decoration:none;
            color:#0d6efd;
            font-weight:600;
        }

    </style>

</head>

<body>

<header>

<nav class="navbar">

<div class="logo">JobPortal</div>

<ul class="nav-links">

<li><a href="index.html">Home</a></li>

<li><a href="jobs.html">Jobs</a></li>

<li><a href="login.html">Login</a></li>

<li><a href="register.html" class="active">Register</a></li>

<li><a href="applications.html">Applications</a></li>

</ul>

</nav>

</header>

<section class="register-container">

<div class="register-box">

<h2>Create Account</h2>

<input
type="text"
id="name"
placeholder="Full Name">

<input
type="email"
id="email"
placeholder="Email Address">

<input
type="password"
id="password"
placeholder="Password">

<button
class="btn"
onclick="registerUser()">

Register

</button>

<p>

Already have an account?

<a href="login.html">

Login

</a>

</p>

</div>

</section>

<footer>

<p>

© 2026 Job Portal | Made by Pushkar Srivastava

</p>

</footer>

<script src="js/auth.js"></script>

</body>

</html>
