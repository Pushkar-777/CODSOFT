<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Job Portal</title>

    <link rel="stylesheet" href="css/style.css">

    <style>

        .login-container{
            width:100%;
            min-height:85vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f5f7fb;
        }

        .login-box{

            width:400px;
            background:#fff;
            padding:35px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,.1);

        }

        .login-box h2{

            text-align:center;
            margin-bottom:25px;
            color:#0d6efd;

        }

        .login-box input{

            width:100%;
            padding:14px;
            margin-bottom:18px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;

        }

        .login-box button{

            width:100%;

        }

        .login-box p{

            margin-top:20px;
            text-align:center;

        }

        .login-box a{

            color:#0d6efd;
            text-decoration:none;
            font-weight:600;

        }

    </style>

</head>

<body>

<header>

<nav class="navbar">

<div class="logo">
JobPortal
</div>

<ul class="nav-links">

<li><a href="index.html">Home</a></li>

<li><a href="jobs.html">Jobs</a></li>

<li><a href="login.html" class="active">Login</a></li>

<li><a href="register.html">Register</a></li>

<li><a href="applications.html">Applications</a></li>

</ul>

</nav>

</header>

<section class="login-container">

<div class="login-box">

<h2>User Login</h2>

<input
type="email"
id="loginEmail"
placeholder="Enter Email">

<input
type="password"
id="loginPassword"
placeholder="Enter Password">

<button
class="btn"
onclick="loginUser()">

Login

</button>

<p>

Don't have an account?

<a href="register.html">

Register

</a>

</p>

</div>

</section>

<footer>

<p>

© 2026 Job Portal | Made by Pushkar Srivastava

</p>

</footer>

<script src="js/auth.js"></script>

</body>

</html>
